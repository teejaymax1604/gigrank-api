<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GigRank — 5 Min Gig Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root { --bg: #09090f; --surface: #12121c; --accent: #7c6ef5; --text: #efeffa; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        .card { background: var(--surface); border-radius: 18px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.07); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: #1a1a28; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .tab.active { background: var(--accent); color: white; }
        .btn-primary { width: 100%; background: var(--accent); color: #fff; padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        textarea { width: 100%; height: 200px; background: #09090f; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 15px; font-family: inherit; margin-top: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .loading { display:none; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="step1">
            <div class="card">
                <h1 style="font-family: 'Syne'; margin-bottom: 10px;">GigRank ⚡</h1>
                <p style="color: #999; margin-bottom: 20px;">Scrape competitors & build your gig in 5 minutes.</p>
                <input type="text" id="keyword" placeholder="Enter keyword (e.g. Shopify Developer)" style="width:100%; padding:15px; border-radius:8px; border:none; background:#1a1a28; color:#fff;">
                <button class="btn-primary" style="margin-top:20px;" onclick="startDeepResearch()">🔍 Analyze & Build Gig</button>
            </div>
        </div>

        <div id="loading" class="loading">
            <h2>Spying on Competitors...</h2>
            <p>Pulling top 15 ranking titles and price points.</p>
        </div>

        <div id="editor" style="display:none;">
            <div class="stat-grid">
                <div class="card" style="margin-bottom:0; text-align:center;">
                    <small>AVG PRICE</small><h2 id="avgPrice">$0</h2>
                </div>
                <div class="card" style="margin-bottom:0; text-align:center;">
                    <small>COMPETITORS ANALYZED</small><h2 id="compCount">0</h2>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="showTab('title')">Gig Title</div>
                <div class="tab" onclick="showTab('desc')">Description</div>
                <div class="tab" onclick="showTab('packages')">Price Plans</div>
            </div>

            <div class="card">
                <div id="title-box">
                    <label>SEO Optimized Title</label>
                    <textarea id="ai-title" placeholder="Generating winning title..."></textarea>
                </div>
                <div id="desc-box" style="display:none;">
                    <label>High-Converting Description</label>
                    <textarea id="ai-desc" placeholder="Generating description..."></textarea>
                </div>
                <div id="packages-box" style="display:none;">
                    <label>3-Tier Package Setup</label>
                    <textarea id="ai-packages" placeholder="Generating plans..."></textarea>
                </div>
            </div>
            <button class="btn-primary" onclick="location.reload()">Done / Start New</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://gigrank-api.onrender.com';
        let scrapedData = {};

        async function startDeepResearch() {
            const kw = document.getElementById('keyword').value;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const res = await fetch(`${BACKEND_URL}/api/scrape-fiverr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: kw })
                });
                const data = await res.json();
                
                if(data.success) {
                    scrapedData = data;
                    showEditor(kw);
                }
            } catch (e) { alert("Error: " + e.message); }
        }

        function showEditor(kw) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('avgPrice').innerText = `$${scrapedData.avgPrice}`;
            document.getElementById('compCount').innerText = scrapedData.competitorCount;

            // MOCK AI GENERATION (This uses the real scraped data to give you the blueprint)
            document.getElementById('ai-title').value = `I will build a professional ${kw} for high conversions`;
            document.getElementById('ai-desc').value = `Looking for a ${kw}? \n\nI analyzed ${scrapedData.competitorCount} top-ranking gigs to see what works. \n\nMy Service Includes:\n- Full Store Setup\n- SEO Optimization\n- Premium Theme...`;
            document.getElementById('ai-packages').value = `BASIC: $${scrapedData.avgPrice - 10} (Simple Setup)\nSTANDARD: $${scrapedData.avgPrice} (Full Design)\nPREMIUM: $${parseInt(scrapedData.avgPrice) + 50} (VIP Growth)`;
        }

        function showTab(type) {
            document.getElementById('title-box').style.display = type === 'title' ? 'block' : 'none';
            document.getElementById('desc-box').style.display = type === 'desc' ? 'block' : 'none';
            document.getElementById('packages-box').style.display = type === 'packages' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
