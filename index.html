<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GigRank — Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root { --bg: #09090f; --surface: #12121c; --accent: #7c6ef5; --text: #efeffa; --text2: #9997b8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; margin: 0; }
        main { width: 100%; max-width: 800px; padding: 40px 20px; }
        .card { background: var(--surface); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 2rem; margin-bottom: 1.5rem; width: 100%; box-sizing: border-box; }
        .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3rem); text-align: center; margin-bottom: 2rem; }
        .btn-primary { width: 100%; background: var(--accent); color: #fff; padding: 18px; border-radius: 12px; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .gig-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .gig-item:last-child { border-bottom: none; }
        .price-tag { color: #2dd4a0; font-weight: 700; }
        #loadWrap { display: none; text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <main>
        <div id="setup">
            <div class="hero"><h1>Gig<span>Rank</span> Intelligence</h1></div>
            <div class="card">
                <label style="display:block; margin-bottom:10px; font-weight:700;">What do you want to rank for?</label>
                <input type="text" id="keyword" value="shopify store developer" style="width:100%; padding:15px; border-radius:8px; border:none; background:#1a1a28; color:#fff;">
                <button class="btn-primary" style="margin-top:20px;" onclick="doResearch()">🔍 Research Live Data</button>
            </div>
        </div>

        <div id="loadWrap">
            <div class="spinner"></div>
            <h2>Scraping Fiverr Results...</h2>
            <p style="color:var(--text2)">Using ScrapingBee proxies to bypass blocks.</p>
        </div>

        <div id="results" style="display:none;">
            <div class="card">
                <h2 id="avgDisplay" style="text-align:center; color:var(--accent); font-size:2.5rem; margin-bottom:10px;">$0</h2>
                <p style="text-align:center; color:var(--text2); margin-bottom:20px;">Average starting price in this niche</p>
                <div id="gigList"></div>
            </div>
            <button class="btn-primary" onclick="location.reload()">🔄 Start New Search</button>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://gigrank-api.onrender.com';

        async function doResearch() {
            const kw = document.getElementById('keyword').value;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('loadWrap').style.display = 'block';

            try {
                const res = await fetch(`${BACKEND_URL}/api/scrape-fiverr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: kw })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('loadWrap').style.display = 'none';
                    document.getElementById('results').style.display = 'block';
                    document.getElementById('avgDisplay').innerText = `$${data.avgPrice}`;
                    document.getElementById('gigList').innerHTML = data.topGigs.map(g => `
                        <div class="gig-item">
                            <span>${g.title}</span>
                            <span class="price-tag">${g.price}</span>
                        </div>
                    `).join('');
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                alert("Error: " + e.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
