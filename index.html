<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GigRank — The 5 Min Gig Launchpad</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root { --bg: #09090f; --surface: #12121c; --accent: #7c6ef5; --text: #efeffa; --text2: #9997b8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; margin-top: 40px; }
        .card { background: var(--surface); border-radius: 18px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.07); position: relative; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; white-space: nowrap; padding-bottom: 10px; }
        .tab { padding: 12px 20px; background: #1a1a28; border-radius: 10px; cursor: pointer; font-size: 13px; border: 1px solid transparent; transition: 0.3s; color: var(--text2); }
        .tab.active { background: var(--accent); color: white; border-color: rgba(255,255,255,0.2); }
        .btn-primary { width: 100%; background: var(--accent); color: #fff; padding: 18px; border-radius: 12px; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        textarea { width: 100%; height: 350px; background: #05050a; color: #fff; border: 1px solid #222; border-radius: 12px; padding: 20px; font-family: inherit; margin-top: 15px; box-sizing: border-box; line-height: 1.6; font-size: 14px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .loading { display:none; text-align: center; padding: 60px 20px; }
        .progress-container { width: 100%; height: 6px; background: #1a1a28; border-radius: 10px; margin: 30px 0; overflow: hidden; }
        #status-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.4s ease; }
        .tag { display: inline-block; background: rgba(124, 110, 245, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: 20px; margin: 5px; font-size: 12px; font-weight: bold; }
        
        /* --- THUMBNAIL GENERATOR STYLES --- */
        #thumbnail-canvas { width: 100%; max-width: 600px; height: auto; border: 2px dashed #444; border-radius: 12px; margin-top: 15px; }
        .thumbnail-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .btn-secondary { background: #1a1a28; color: white; padding: 15px; border-radius: 10px; border: 1px solid #333; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="step1">
            <div class="card">
                <h1 style="font-family: 'Syne'; margin-bottom: 5px;">GigRank ⚡</h1>
                <p style="color: var(--text2); margin-bottom: 25px;">Enter your niche. We'll scrape winners, build your gig, and generate the thumbnail.</p>
                <input type="text" id="keyword" placeholder="e.g. Shopify Store Developer" style="width:100%; padding:18px; border-radius:12px; border:1px solid #333; background:#1a1a28; color:#fff; font-size: 1rem; box-sizing: border-box;">
                <button class="btn-primary" style="margin-top:20px;" onclick="startDeepResearch()">🚀 Analyze & Build Gig Bundle</button>
            </div>
        </div>

        <div id="loading" class="loading card">
            <h2 id="status-text">Analyzing Competitor Psychology...</h2>
            <div class="progress-container"><div id="status-bar"></div></div>
            <p id="status-log" style="color:var(--text2); font-size: 14px;">Filtering out sponsored ads...</p>
        </div>

        <div id="editor" style="display:none;">
            <div class="stat-grid">
                <div class="card" style="text-align:center;"><small>PAGE 1 AVG (PRO)</small><h2 id="avgPrice" style="color: #2dd4a0;">$0</h2></div>
                <div class="card" style="text-align:center;"><small>SEARCH COMPETITION</small><h2 id="compCount" style="color: var(--accent);">Low</h2></div>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="showTab('title', event)">SEO Title</div>
                <div class="tab" onclick="showTab('desc', event)">Description</div>
                <div class="tab" onclick="showTab('packages', event)">Pricing</div>
                <div class="tab" onclick="showTab('tags', event)">Search Tags</div>
                <div class="tab" onclick="showTab('thumbnail', event)">Gig Thumbnail 🖼️</div>
            </div>

            <div class="card">
                <div id="title-box"><label>Winning Gig Title</label><textarea id="ai-title" style="height: 100px;"></textarea></div>
                <div id="desc-box" style="display:none;"><label>Winning Description</label><textarea id="ai-desc"></textarea></div>
                <div id="packages-box" style="display:none;"><label>Winning Pricing Plans</label><textarea id="ai-packages"></textarea></div>
                <div id="tags-box" style="display:none;"><label>Search Tags</label><div id="tag-container" style="min-height: 100px; margin-top:20px;"></div></div>
                
                <div id="thumbnail-box" style="display:none;">
                    <label>Auto-Generated Strategic Thumbnail (1280x720)</label>
                    <div style="text-align:center;">
                        <canvas id="thumbnail-canvas" width="1280" height="720"></canvas>
                    </div>
                    <div class="thumbnail-controls">
                        <button class="btn-secondary" onclick="generateThumbnail()">Regenerate Visual</button>
                        <button class="btn-primary" onclick="downloadThumbnail()">Download Image (PNG)</button>
                    </div>
                </div>
            </div>
            <button class="btn-primary" onclick="location.reload()">Start New Analysis</button>
        </div>
    </div>

    <script>
        // CONFIG
        const BACKEND_URL = 'https://gigrank-api.onrender.com';
        let scrapedData = {};

        // MAIN LOGIC
        async function startDeepResearch() {
            const kw = document.getElementById('keyword').value;
            if (!kw) return alert("Enter keyword!");
            document.getElementById('step1').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const logs = ["Connecting Proxies...", "Filtering Ads...", "Parsing Sellers...", "Analyzing Keywords...", "Calculating Price Floor...", "Finalizing Bundle..."];
            let progress = 0;
            const uiInterval = setInterval(() => {
                if (progress < 90) { progress += 10; document.getElementById('status-bar').style.width = progress + '%'; }
                document.getElementById('status-log').innerText = logs[Math.floor(progress/15)] || logs[5];
            }, 1500);

            try {
                const res = await fetch(`${BACKEND_URL}/api/scrape-fiverr`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: kw })
                });
                const data = await res.json();
                clearInterval(uiInterval);
                if(data.success) { 
                    scrapedData = data; 
                    showEditor(kw); 
                    generateThumbnail(); // Auto-generate on load
                }
            } catch (e) { alert("Error: " + e.message); location.reload(); }
        }

        function showEditor(kw) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('avgPrice').innerText = `$${scrapedData.avgPrice}`;
            document.getElementById('compCount').innerText = scrapedData.competitorCount > 20 ? "High" : "Optimal";

            const topTitle = scrapedData.topTitles[0] || `Design a Professional ${kw}`;
            document.getElementById('ai-title').value = `I will ${topTitle.toLowerCase().replace('i will', '').trim()}`;
            document.getElementById('ai-desc').value = `★ PROFESSIONAL ${kw.toUpperCase()} SERVICE ★\n\nI analyzed the top 1% of sellers in this niche to create this service. I don't just build, I optimize for sales.\n\n✔ WHY CHOOSE ME?\n- Professional Design\n- SEO Friendly\n- Conversion Optimization\n- 24/7 Support\n\n✔ WHAT YOU GET:\n- Full Setup\n- Custom Design\n- Responsive Layout\n\nOrder now and dominate search results!`;
            
            const base = parseInt(scrapedData.avgPrice);
            document.getElementById('ai-packages').value = `BASIC ($${base - 20}): Standard Setup\nPerfect for small projects.\n\nSTANDARD ($${base}): Professional Build\nThe Market Standard. Full SEO optimization.\n\nPREMIUM ($${base + 100}): VIP Business Package\nFull VIP growth package.`;
            document.getElementById('tag-container').innerHTML = scrapedData.suggestedTags.map(t => `<span class="tag">${t}</span>`).join('');
        }

        function showTab(type, event) {
            ['title', 'desc', 'packages', 'tags', 'thumbnail'].forEach(t => document.getElementById(t + '-box').style.display = 'none');
            document.getElementById(type + '-box').style.display = 'block';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // --- THUMBNAIL GENERATOR LOGIC ---
        function generateThumbnail() {
            const canvas = document.getElementById('thumbnail-canvas');
            const ctx = canvas.getContext('2d');
            const kw = document.getElementById('keyword').value.toUpperCase();
            
            // 1. Sleek, Dark Gradient Background
            ctx.fillStyle = '#12121c'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Accent gradient burst
            const grd = ctx.createRadialGradient( canvas.width/2,  canvas.height/2, 5,  canvas.width/2,  canvas.height/2, 600);
            grd.addColorStop(0, '#212133'); 
            grd.addColorStop(1, '#09090f');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Bold "Hero" Typography (Key Niche)
            const heroText = scrapedData.visualStrategy ? scrapedData.visualStrategy.heroText : kw.split(' ')[0];
            ctx.font = '800 120px Syne, Arial'; // Use Syne if loaded, fallback to Arial
            ctx.fillStyle = '#efeffa';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(heroText, canvas.width / 2, canvas.height / 2 - 80);

            // 3. Highlight Secondary Niche/Subtext
            const subText = scrapedData.visualStrategy ? scrapedData.visualStrategy.subTexts.join(' ') : kw.split(' ').slice(1, 3).join(' ');
            ctx.font = '700 60px Syne, Arial';
            ctx.fillStyle = '#7c6ef5'; // Accent Color
            ctx.fillText(subText, canvas.width / 2, canvas.height / 2 + 30);

            // 4. Strategic Trusted Selling Points (Bottom)
            ctx.font = '500 35px DM Sans, Arial';
            ctx.fillStyle = '#9997b8';
            ctx.fillText('SEO OPTIMIZED  |  HIGH CONVERSION  |  FREE REVISIONS', canvas.width / 2, canvas.height - 100);
            
            // Branding watermark
            ctx.font = '700 25px Syne, Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillText('POWERED BY GIGRANK ⚡', canvas.width / 2, canvas.height - 40);
        }

        function downloadThumbnail() {
            const canvas = document.getElementById('thumbnail-canvas');
            const kw = document.getElementById('keyword').value;
            const link = document.createElement('a');
            link.download = `GigRank-${kw.replace(' ', '-')}-Thumbnail.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        // Load fonts for canvas on start
        window.onload = () => { generateThumbnail(); }
    </script>
</body>
</html>
